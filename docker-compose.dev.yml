services:
  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head && uvicorn src.app:app --host 0.0.0.0 --reload --port 8000"
    container_name: backend
    volumes:
      - ./backend:/backend
    env_file: ".env.dev"
    ports:
      - "8000:8000"
    depends_on:
      backend-db:
        condition: service_healthy

  backend-worker:
    build: ./backend
    command: [ 'celery', '-A', 'src.workers.tasks.celery_app', 'worker', '-l', 'info' ]
    container_name: backend-worker
    env_file: ".env.dev"
    volumes:
      - ./backend:/backend
    depends_on:
      backend-db:
        condition: service_healthy
      backend-redis:
        condition: service_started

  backend-db:
    image: postgres:latest
    container_name: backend-db
    ports:
      - "5433:5432"
    env_file: ".env.dev"
    volumes:
      - backend-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-redis:
    image: redis:latest
    container_name: backend-redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  backend-db-volume:
